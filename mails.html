<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YRAM — Modèles de mails</title>
<style>
:root{--red:#D4003F;--navy:#1A1A2E;--border:#E2E8F0;--text:#1A1A2E;--muted:#6B7280;--blue:#1E40AF;--green:#065F46;--orange:#92400E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F4F8;color:var(--text);font-size:14px;min-height:100vh;}
.topbar{background:#fff;padding:0 1.5rem;height:50px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--red);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-brand{font-size:13px;font-weight:800;letter-spacing:.12em;color:#111;text-transform:uppercase;}
.topbar-divider{width:1px;height:18px;background:#E5E7EB;}
.topbar-sub{font-size:11px;color:#9CA3AF;font-weight:500;}
.nav{display:flex;gap:0;align-items:center;}
.nav a{color:#6B7280;text-decoration:none;font-size:11.5px;font-weight:600;padding:6px 14px;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.nav a:hover{color:#111;}
.nav a.active{color:var(--red);border-bottom-color:var(--red);}

.layout{display:flex;height:calc(100vh - 50px);}

/* SIDEBAR */
.sidebar{width:280px;background:#FAFAFA;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;}
.search-box{padding:.65rem .75rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;}
.search-box{position:relative;}
.search-box svg{position:absolute;left:1.35rem;top:50%;transform:translateY(-50%);pointer-events:none;color:#9CA3AF;}
.search-box input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;font-size:12px;outline:none;transition:all .15s;background:#F9FAFB;color:var(--text);}
.search-box input::placeholder{color:#9CA3AF;}
.search-box input:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(212,0,63,.07);}
.cat-block{border-bottom:1px solid var(--border);}
.cat-header{padding:.5rem .85rem;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.cat-header:hover{background:#F9FAFB;}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-count{margin-left:auto;font-size:9px;background:#F3F4F6;color:#6B7280;border-radius:10px;padding:1px 6px;font-weight:700;}
.cat-items{padding:.25rem 0;}
.mail-item{padding:.4rem .85rem .4rem 1.6rem;font-size:11.5px;color:#4B5563;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:6px;border-left:2px solid transparent;}
.mail-item:hover{background:#F9FAFB;color:#111;}
.mail-item.active{background:#FFF0F3;color:var(--red);border-left-color:var(--red);font-weight:700;}
.mail-item .badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.cat-collapse .cat-items{display:none;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:1.5rem;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#9CA3AF;gap:.75rem;}
.empty-state svg{opacity:.3;}

.mail-view{max-width:720px;}
.mail-header{margin-bottom:1.25rem;background:#fff;border-radius:10px;padding:1rem 1.25rem;border:1px solid var(--border);}
.mail-cat-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:.5rem;}
.mail-title{font-size:20px;font-weight:800;color:#1A1A2E;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:2px solid var(--red);display:inline-block;}
.mail-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mail-tag{font-size:10px;font-weight:600;background:#F3F4F6;color:#6B7280;border-radius:4px;padding:2px 7px;}

.variants{display:flex;flex-direction:column;gap:1rem;}
.variant-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.variant-header{padding:.5rem 1rem;font-size:10px;font-weight:700;color:#6B7280;background:#F8F9FB;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-left:3px solid var(--red);}
.variant-label{display:flex;align-items:center;gap:6px;}
.variant-body{padding:1rem 1.25rem;font-size:13px;line-height:1.75;color:#1A1A2E;white-space:pre-wrap;font-family:'Segoe UI',Arial,sans-serif;}
.variant-body strong{font-weight:700;color:#111;}
.btn-copy{font-size:11px;font-weight:700;background:none;border:1px solid var(--border);border-radius:5px;padding:3px 10px;cursor:pointer;color:#6B7280;transition:all .15s;display:flex;align-items:center;gap:4px;}
.btn-copy:hover{border-color:var(--red);color:var(--red);}
.btn-copy.copied{border-color:#065F46;color:#065F46;}
.tags-editor{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:.5rem;padding:.5rem .75rem;background:#FFF8F9;border:1px solid #FFE4EB;border-radius:8px;}
.tag-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;background:#F3F4F6;color:#4B5563;border:1px solid #E5E7EB;border-radius:12px;padding:2px 8px 2px 8px;cursor:default;}
.tag-chip.custom{background:#FFF0F3;color:var(--red);border-color:#FFCCD9;}
.tag-chip .tag-del{cursor:pointer;font-size:11px;color:#9CA3AF;margin-left:2px;line-height:1;}
.tag-chip .tag-del:hover{color:var(--red);}
.tag-add-input{border:none;outline:none;font-size:11px;background:transparent;color:var(--text);min-width:80px;padding:2px 4px;}
.tag-add-input::placeholder{color:#C0C8D2;}
.btn-tag-add{font-size:10px;font-weight:700;background:none;border:1px dashed #D1D5DB;border-radius:12px;padding:2px 8px;color:#9CA3AF;cursor:pointer;transition:all .15s;}
.btn-tag-add:hover{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="search-box" style="padding:.65rem .75rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;position:sticky;">
      <svg style="position:absolute;left:1.35rem;top:50%;transform:translateY(-50%);pointer-events:none;" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Rechercher un mail..." oninput="filterMails()" style="width:100%;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 12px 8px 34px;font-size:12px;outline:none;transition:all .15s;background:#F9FAFB;color:#1A1A2E;" onfocus="this.style.borderColor='#D4003F';this.style.background='#fff';this.style.boxShadow='0 0 0 3px rgba(212,0,63,.07)'" onblur="this.style.borderColor='#E2E8F0';this.style.background='#F9FAFB';this.style.boxShadow='none'">
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div class="main" id="main">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <div style="font-size:13px;font-weight:600;">Sélectionnez un modèle</div>
      <div style="font-size:12px;">Choisissez un mail dans la liste à gauche</div>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║              MODÈLES DE MAILS — AJOUTER / SUPPRIMER             ║
// ╠══════════════════════════════════════════════════════════════════╣
// ║  AJOUTER un mail : copier un bloc { ... }, le coller            ║
// ║  avant le ]; final, changer l'id et remplir les champs.         ║
// ║                                                                  ║
// ║  SUPPRIMER un mail : effacer le bloc { id:'...', ... },         ║
// ║                                                                  ║
// ║  Chaque mail :                                                   ║
// ║    id       : identifiant unique (pas d'espace)                  ║
// ║    title    : titre affiché dans la liste                        ║
// ║    tags     : mots-clés pour la recherche                        ║
// ║    variants : tableau de { label, body }                         ║
// ║               body = texte du mail (utiliser ` ` backticks)      ║
// ╚══════════════════════════════════════════════════════════════════╝

// ── EXEMPLE ──────────────────────────────────────────────────────────
// {
//   id: 'mon-mail',
//   title: 'Mon titre',
//   tags: ['mot-clé', 'autre-mot'],
//   variants: [
//     { label: 'Standard', body: `Bonjour,\n\nCorps du mail.\n\nCordialement,` },
//   ]
// },

const MAILS = [

  // ── AUX DÉBITEURS ────────────────────────────────────────────────────

  {
    id: 'protocole-envoi',
    title: "Protocole d'accord — Envoi",
    tags: ['protocole', 'accord', 'échéancier', 'signature'],
    variants: [
      { label: 'Envoi', body: `Bonjour,

Un protocole d'accord va vous être envoyé par mail pour signature électronique.

L'échéancier ne sera validé qu'après signature de ce dernier.

Cordialement,` },
      { label: 'Réception — rappel engagements (v1)', body: `Bonjour,

Votre protocole d'accord signé a bien été réceptionné.

Nous vous rappelons que ce document vaut reconnaissance de dette et engagement ferme de votre part quant au règlement selon l'échéancier convenu.

Aucune tolérance ne sera accordée.

En cas de non-respect d'une seule échéance à sa date :
- l'intégralité du solde deviendra immédiatement exigible,
- le protocole sera caduc de plein droit,
- et le dossier sera transmis pour suites appropriées, sans nouvelle relance.

Nous vous invitons à prendre toutes les dispositions nécessaires afin d'éviter une telle situation.

Cordialement,` },
      { label: 'Réception — rappel engagements (v2)', body: `Bonjour,

Nous confirmons la réception de votre protocole d'accord signé.

Ce document vaut reconnaissance de dette et engagement ferme et définitif de votre part.

En conséquence, aucun écart ne sera toléré.

Le non-respect d'une seule échéance à sa date entraînera immédiatement et de plein droit :
- l'exigibilité de l'intégralité du solde restant dû,
- la caducité du protocole,
- et la transmission de votre dossier pour mise en œuvre de suites adaptées, sans nouvelle mise en demeure ni délai supplémentaire.

Cordialement,` },
      { label: 'Non-respect — Protocole caduc (v1)', body: `Bonjour,

Nous constatons le non-respect de votre protocole d'accord, notamment par le défaut de règlement de l'échéance convenue à sa date.

En application des termes du protocole que vous avez signé, celui-ci est désormais caduc de plein droit.

En conséquence :
- l'intégralité du solde restant dû devient immédiatement exigible,
- la suspension des démarches de recouvrement prend fin sans délai.

Votre dossier est transmis pour mise en œuvre des suites appropriées.

Aucune nouvelle relance ni délai supplémentaire ne sera accordé.

Cordialement,` },
      { label: 'Non-respect — Protocole caduc (v2)', body: `Bonjour,

Malgré votre engagement formalisé par la signature du protocole d'accord, nous constatons le non-respect de vos obligations.

Cette défaillance entraîne de plein droit :
- la caducité immédiate du protocole,
- l'exigibilité intégrale et immédiate du solde restant dû,
- la reprise des démarches de recouvrement.

Aucun échéancier ne sera désormais accordé. Aucune tolérance ne sera appliquée.

Toute régularisation devra intervenir sans délai sur la totalité des sommes dues.

Cordialement,` },
    ]
  },

  {
    id: 'justif-paiement',
    title: 'Demande de justificatif de paiement',
    tags: ['justificatif', 'paiement', 'preuve'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Vous indiquez avoir réglé votre dette auprès de votre créancier.

Afin de pouvoir traiter votre réclamation, nous vous invitons à nous transmettre un justificatif attestant de ce paiement.

À défaut de réception d'un justificatif, votre réclamation ne pourra pas être prise en compte et la procédure se poursuivra normalement.

Dans l'attente de votre retour.

Cordialement,` },
    ]
  },

  {
    id: 'justif-resiliation',
    title: 'Demande de justificatif de résiliation',
    tags: ['justificatif', 'résiliation', 'contrat'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Vous indiquez avoir sollicité la résiliation de votre contrat auprès de votre créancier.

Afin de pouvoir traiter votre réclamation, nous vous invitons à nous transmettre un justificatif attestant de cette demande de résiliation.

À défaut de réception d'un justificatif, votre réclamation ne pourra pas être prise en compte et la procédure se poursuivra normalement.

Dans l'attente de votre retour.

Cordialement,` },
    ]
  },

  {
    id: 'justif-echeancier',
    title: "Demande de justificatif d'échéancier",
    tags: ['justificatif', 'échéancier', 'créancier'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Vous nous avez indiqué avoir mis en place un échéancier directement avec votre créancier.

Afin de pouvoir traiter votre réclamation, nous vous remercions de bien vouloir nous transmettre un justificatif.

À défaut de réception de ce document, votre dossier restera inchangé et la procédure se poursuivra.

Cordialement,` },
    ]
  },

  {
    id: 'justif-reclamation',
    title: 'Demande de justificatif de réclamation',
    tags: ['justificatif', 'réclamation', 'Runeo', 'Dioneo'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Vous nous indiquez avoir transmis des éléments à votre créancier.

Afin de pouvoir traiter votre réclamation, nous vous remercions de bien vouloir nous communiquer une copie des démarches effectuées (courrier, formulaire, accusé de réception, etc.).

Pour déposer votre réclamation, vous pouvez utiliser le lien correspondant à votre service gestionnaire :
- RUNEO : https://www.runeo.re/nous-contacter
- DIONEO : https://dioneo.re/nous-contacter
- Eaux de La Possession : https://www.eauxdelapossession.re/nous-contacter

Dans l'attente, la dette demeure exigible et la procédure suit son cours.

Cordialement,` },
    ]
  },

  {
    id: 'justif-cession',
    title: 'Demande de certificat de cession',
    tags: ['justificatif', 'cession', 'véhicule', 'vente'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Vous nous indiquez avoir vendu le véhicule concerné par l'impayé.

Afin de pouvoir examiner votre réclamation, nous vous remercions de bien vouloir nous transmettre le certificat de cession du véhicule.

À défaut de réception de ce justificatif, votre réclamation ne pourra pas être traitée et la procédure de recouvrement se poursuivra.

Dans l'attente de votre retour.

Cordialement,` },
    ]
  },

  {
    id: 'justif-revenus',
    title: 'Demande de justificatif de revenus',
    tags: ['justificatif', 'revenus', 'salaire', 'CAF', 'échéancier'],
    variants: [
      { label: 'Étude de la proposition', body: `Bonjour,

Afin d'étudier votre proposition d'échéancier, nous vous remercions de bien vouloir nous transmettre un justificatif de vos revenus (dernier bulletin de salaire, attestation CAF, avis de situation Pôle emploi, etc.).

Dans l'attente de votre retour,

Cordialement,` },
      { label: 'Proposition insuffisante', body: `Bonjour,

Votre proposition d'échéancier n'est pas suffisante au regard du montant de votre dette.

Afin d'étudier votre demande, nous vous remercions de bien vouloir nous transmettre un justificatif de revenus (dernier bulletin de salaire, attestation CAF, avis de situation Pôle emploi, etc.).

Dans l'attente de votre retour,

Cordialement,` },
    ]
  },

  {
    id: 'justif-demenagement',
    title: 'Demande de justificatif de déménagement',
    tags: ['justificatif', 'déménagement', 'état des lieux', 'index', 'EDF', 'Runeo', 'Allianz'],
    variants: [
      { label: 'EDF', body: `Bonjour,

Vous nous indiquez avoir quitté le logement concerné par la facture EDF impayée.

Afin de traiter votre réclamation, merci de bien vouloir nous transmettre un état des lieux de sortie comportant les index du compteur EDF.

Pouvez-vous également nous confirmer si cet état des lieux a été transmis à EDF lors de votre changement d'adresse ?

Dans l'attente de votre retour,

Cordialement,` },
      { label: 'Runeo', body: `Bonjour,

Vous nous indiquez avoir quitté le logement concerné par la facture RUNEO impayée.

Afin de pouvoir examiner votre réclamation, merci de bien vouloir nous transmettre l'état des lieux de sortie comportant les index du compteur d'eau.

Dans l'attente de votre retour,

Cordialement,` },
      { label: 'Allianz', body: `Bonjour,

Vous nous indiquez avoir quitté le logement concerné par la facture ALLIANZ impayée.

Afin de pouvoir examiner votre réclamation, merci de bien vouloir nous transmettre votre état des lieux de sortie.

Dans l'attente de votre retour,

Cordialement,` },
    ]
  },

  {
    id: 'justif-surendettement',
    title: 'Demande de justificatif de surendettement',
    tags: ['justificatif', 'surendettement', 'Banque de France', 'recevabilité'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Vous indiquez que la dette ferait partie d'un dossier de surendettement déclaré recevable.

À ce jour, aucune notification officielle de la Banque de France ne nous a été transmise.

Afin de mettre à jour votre dossier, merci de bien vouloir nous communiquer la décision de recevabilité ou tout document émanant de la Banque de France.

En l'absence de justificatif, la procédure suit son cours.

Dans l'attente de votre transmission,

Cordialement,` },
    ]
  },

  {
    id: 'paiement-non-recu',
    title: 'Paiement non reçu',
    tags: ['paiement', 'virement', 'non reçu', 'justificatif'],
    variants: [
      { label: 'Générique', body: `Bonjour,

Vous nous avez indiqué avoir procédé au règlement de votre dette par virement bancaire.

Après vérification auprès du créancier, aucun paiement correspondant n'a été identifié à ce jour.

Afin de permettre la localisation éventuelle de votre virement, merci de bien vouloir nous transmettre :
- le RIB du compte destinataire que vous avez utilisé,
- ainsi que le relevé de compte où apparaît l'opération (une capture d'écran n'est pas suffisante).

Dans l'attente de ces justificatifs, la procédure suit son cours.

Cordialement,` },
      { label: 'EDF', body: `Bonjour,

Vous nous avez indiqué avoir procédé au règlement de votre dette envers EDF.

Après vérification auprès du créancier, aucun paiement correspondant n'a été identifié à ce jour.

Merci de bien vouloir nous transmettre un justificatif de paiement.

Dans l'attente, la procédure suit son cours.

Cordialement,` },
    ]
  },

  {
    id: 'paiement-nouvelle-adresse',
    title: 'Paiement effectué sur nouvelle adresse',
    tags: ['paiement', 'adresse', 'ancienne adresse', 'EDF'],
    variants: [
      { label: 'Standard', body: `Bonjour,

Après vérification de votre dossier, le paiement effectué concerne votre nouvelle adresse.

Vous demeurez en revanche redevable d'une somme au titre de votre ancienne adresse.

Nous vous remercions de bien vouloir contacter nos services au 0262 910 950 afin de procéder à la régularisation de votre situation.

Cordialement,` },
    ]
  },

  {
    id: 'paiement-cheque-energie',
    title: 'Paiement par chèque énergie',
    tags: ['paiement', 'chèque énergie', 'EDF'],
    variants: [
      { label: 'Débiteur', body: `Bonjour,

Afin de pouvoir procéder au traitement et à l'encaissement de votre chèque énergie, nous vous remercions de bien vouloir nous transmettre :

- Une copie de votre chèque énergie, avec la zone à gratter (partie droite) déjà révélée ;
- Une facture récente afin de valider l'imputation du paiement.

Sans ces documents, nous ne serons pas en mesure de traiter votre demande.

Dans l'attente de votre retour.

Cordialement,` },
      { label: 'Client (vérification)', body: `Bonjour,

Le client mentionné dans l'objet nous indique avoir bénéficié d'un chèque énergie.

Pouvez-vous nous confirmer si ce paiement a bien été reçu et imputé sur son compte ?

Cordialement,` },
    ]
  },

  {
    id: 'echeancier-trop-faible',
    title: 'Échéancier trop faible',
    tags: ['échéancier', 'insuffisant', 'montant', 'mensualité'],
    variants: [
      { label: 'Proposition initiale insuffisante', body: `Bonjour,

Nous vous informons que le montant proposé est largement insuffisant au regard du montant total de votre dette et ne permet pas d'envisager une régularisation effective du dossier.

Nous vous invitons à revoir le montant de vos échéances à la hausse et à nous proposer sans délai un plan de règlement adapté.

À défaut de proposition conforme, la procédure se poursuivra.

Cordialement,` },
      { label: 'Paiement reçu mais insuffisant', body: `Bonjour,

Nous confirmons avoir bien reçu votre paiement.

Toutefois, le montant versé est insuffisant au regard du solde de votre dette.

Il sera donc nécessaire d'augmenter le montant des échéances.

Merci de nous transmettre une proposition de règlement révisée.

Cordialement,` },
    ]
  },

  {
    id: 'pas-date-paiement',
    title: 'Pas de date précise de paiement',
    tags: ['paiement', 'date', 'relance', 'procédure'],

// ── MOTEUR DE RECHERCHE ET AFFICHAGE ──────────────────────────────────────

let currentId = null;

const RED = '#D4003F';

function buildSidebar(filter) {
  const container = document.getElementById('sidebar-content');
  container.innerHTML = '';
  const words = filter ? filter.toLowerCase().trim().split(/\s+/).filter(Boolean) : [];

  const filtered = MAILS.filter(m => {
    if (!words.length) return true;
    const haystack = [m.title, ...m.tags, ...m.variants.map(v => v.body)].join(' ').toLowerCase();
    return words.every(w => haystack.includes(w));
  });

  if (!filtered.length) {
    container.innerHTML = '<div style="padding:2rem 1rem;text-align:center;font-size:12px;color:#9CA3AF;">Aucun résultat</div>';
    return;
  }

  filtered.forEach(m => {
    const item = document.createElement('div');
    item.className = 'mail-item' + (m.id === currentId ? ' active' : '');
    if (m.id === currentId) {
      item.style.borderLeftColor = RED;
      item.style.background = '#FFF0F3';
    }
    item.dataset.id = m.id;

    let title = m.title;
    words.forEach(w => {
      const re = new RegExp('(' + w.replace(/[.*+?^${}()|\[\]\\]/g, '\\$&') + ')', 'gi');
      title = title.replace(re, '<mark style="background:#FFF0A0;border-radius:2px;padding:0 1px;">$1</mark>');
    });

    item.innerHTML = `<span style="flex:1;min-width:0;">${title}</span>${m.variants.length > 1 ? `<span class="badge" style="background:#FFF0F3;color:${RED}">${m.variants.length}</span>` : ''}`;
    item.style.display = 'flex';
    item.style.alignItems = 'center';
    item.style.gap = '6px';
    item.onclick = () => openMail(m.id);
    container.appendChild(item);
  });
}

function openMail(id) {
  currentId = id;
  const mail = MAILS.find(m => m.id === id);
  if (!mail) return;
  buildSidebar(document.getElementById('search').value);

  const variantsHtml = mail.variants.map((v, i) => `
    <div class="variant-card">
      <div class="variant-header">
        <div class="variant-label">
          ${mail.variants.length > 1 ? `<span style="font-size:10px;font-weight:800;background:#FFF0F3;color:${RED};border-radius:4px;padding:2px 7px;">Variante ${i + 1}</span>` : '<span style="color:#9CA3AF">Mail type</span>'}
          <span style="color:#9CA3AF">${v.label}</span>
        </div>
        <button class="btn-copy" onclick="copyVariant(${i},'${id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copier
        </button>
      </div>
      <div class="variant-body">${escHtml(v.body)}</div>
    </div>
  `).join('');

  document.getElementById('main').innerHTML = `
    <div class="mail-view">
      <div class="mail-header">
        <div class="mail-title">${mail.title}</div>
        <div class="mail-meta">${mail.tags.map(t => `<span class="mail-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="variants">${variantsHtml}</div>
    </div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function copyVariant(varIdx, mailId) {
  const mail = MAILS.find(m => m.id === mailId);
  if (!mail) return;
  navigator.clipboard.writeText(mail.variants[varIdx].body).then(() => {
    const btn = event.currentTarget;
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copié !`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier`;
    }, 2000);
  });
}

function filterMails() {
  buildSidebar(document.getElementById('search').value);
}

buildSidebar();
</script>
