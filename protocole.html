<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YRAM Recouvrement — Protocole d'Accord</title>
<style>
:root{--navy:#1A1A1A;--blue:#2E5FA3;--blue-light:#D6E4F7;--blue-mid:#185FA5;--red:#D4003F;--gray:#6B7280;--gray-light:#F4F6FA;--border:#E2E8F0;--text:#1A1A2E;--muted:#6B7280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F2F5;color:var(--text);font-size:14px;}
.topbar{background:#fff;color:var(--text);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:50px;border-bottom:2px solid var(--red);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-brand{font-size:13px;font-weight:800;letter-spacing:.12em;color:#111;text-transform:uppercase;}
.topbar-divider{width:1px;height:18px;background:#E5E7EB;}
.topbar-sub{font-size:11px;color:#9CA3AF;font-weight:500;}
.nav{display:flex;gap:0;align-items:center;}
.nav a{color:#6B7280;text-decoration:none;font-size:11.5px;font-weight:600;padding:6px 14px;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.nav a:hover{color:#111;}
.nav a.active{color:var(--red);border-bottom-color:var(--red);}
.red-bar{display:none;}
.app{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 60px);}
.sidebar{background:#F8F9FB;border-right:1px solid var(--border);padding:.6rem .65rem;display:flex;flex-direction:column;gap:.4rem;overflow-y:auto;max-height:calc(100vh - 60px);}
.section-block{border-radius:7px;overflow:visible;}
.section-block-header{display:flex;align-items:center;gap:6px;padding:.3rem .6rem;font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;border-radius:7px 7px 0 0;cursor:default;}
.section-block-icon{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-block-body{background:#fff;padding:.5rem .6rem .6rem;display:flex;flex-direction:column;gap:4px;border-radius:0 0 7px 7px;border:1px solid rgba(0,0,0,.07);border-top:none;}
/* Créancier */
.block-creancier .section-block-header{background:#E5E7EB;color:#374151;}
.block-creancier .section-block-icon{background:#C9CDD5;}
/* Débiteur */
.block-debiteur .section-block-header{background:#FEE2E8;color:#9B1D35;}
.block-debiteur .section-block-icon{background:#FBBFCA;}
/* Créance */
.block-creance .section-block-header{background:#DBEAFE;color:#1E3A6E;}
.block-creance .section-block-icon{background:#93C5FD;}
/* Échéancier */
.block-echeancier .section-block-header{background:#D1FAE5;color:#065F46;}
.block-echeancier .section-block-icon{background:#6EE7B7;}
.field{display:flex;flex-direction:column;gap:2px;}
.field label{font-size:10px;color:#6B7280;font-weight:600;}
.field input,.field select{border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:11.5px;color:var(--text);background:#fff;outline:none;width:100%;transition:border-color .15s,background .15s;}
.field input:focus,.field select:focus{box-shadow:0 0 0 2px rgba(30,90,165,.1);}
/* Champs colorés par bloc */
.block-creancier .field input,.block-creancier .field select{background:#F3F4F6;border-color:#D1D5DB;}
.block-creancier .field input:focus,.block-creancier .field select:focus{border-color:#6B7280;background:#fff;box-shadow:0 0 0 2px rgba(107,114,128,.12);}
.block-debiteur .field input,.block-debiteur .field select{background:#FFF5F7;border-color:#FBBFCA;}
.block-debiteur .field input:focus,.block-debiteur .field select:focus{border-color:#DC2626;background:#fff;box-shadow:0 0 0 2px rgba(220,38,38,.1);}
.block-creance .field input,.block-creance .field select{background:#EFF6FF;border-color:#BFDBFE;}
.block-creance .field input:focus,.block-creance .field select:focus{border-color:#1E40AF;background:#fff;box-shadow:0 0 0 2px rgba(30,64,175,.1);}
.block-echeancier .field input,.block-echeancier .field select{background:#F0FDF4;border-color:#A7F3D0;}
.block-echeancier .field input:focus,.block-echeancier .field select:focus{border-color:#065F46;background:#fff;box-shadow:0 0 0 2px rgba(6,95,70,.1);}
.sep{display:none;}
.btn-print{background:var(--blue-mid);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;width:100%;transition:background .15s;letter-spacing:.02em;margin-top:.15rem;}
.btn-print:hover{background:#0C447C;}
.toggle-btn{flex:1;padding:6px 8px;border:1.5px solid #D1D5DB;border-radius:6px;background:#F9FAFB;font-size:11px;font-weight:600;color:#9CA3AF;cursor:pointer;transition:all .15s;}
.toggle-btn.active{background:#065F46;border-color:#065F46;color:#fff;font-weight:700;}
.toggle-btn:not(.active):hover{background:#F0FDF4;border-color:#A7F3D0;color:#065F46;}
.main{padding:1.5rem;overflow-y:auto;max-height:calc(100vh - 60px);}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;max-width:820px;margin-left:auto;margin-right:auto;}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;}
.sum-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.sum-val{font-size:20px;font-weight:700;color:var(--text);}
.sum-val.blue{color:var(--blue-mid);}
.sum-val.red{color:var(--red);}

/* PREVIEW */
.preview-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;max-width:820px;margin:0 auto;}
.empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);}

/* DOCUMENT */
.doc{font-family:'Segoe UI',Arial,sans-serif;color:#1A1A2E;}
.doc-header{background:#fff;border-bottom:2px solid var(--red);padding:1.25rem 2.5rem 1rem;display:flex;align-items:flex-end;justify-content:space-between;}
.doc-header-left{}
.doc-brand{font-size:9px;font-weight:800;letter-spacing:.16em;color:#9CA3AF;text-transform:uppercase;margin-bottom:5px;}
.doc-title{font-size:22px;font-weight:800;letter-spacing:-.01em;color:#111;}
.doc-sub{font-size:11px;color:#6B7280;margin-top:3px;font-style:normal;}
.doc-ref-badge{font-size:10px;font-weight:700;background:#F3F4F6;color:#374151;border:1px solid #E5E7EB;border-radius:5px;padding:4px 10px;white-space:nowrap;align-self:center;}
.doc-redbar{display:none;}
.doc-body{padding:1.75rem 2.5rem;}
.parties-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.party-card{background:#F3F4F6;border-radius:6px;padding:.875rem 1rem;border-left:3px solid #6B7280;}
.party-card.debtor{background:#FFF5F7;border-left-color:#DC2626;}
.party-role{font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.party-card.debtor .party-role{color:#9B1D35;}
.party-name{font-size:13px;font-weight:700;}
.party-addr{font-size:11px;color:var(--muted);margin-top:2px;}
.party-mandataire{margin-top:8px;padding-top:8px;border-top:1px dashed #d0d8e8;}
.party-mandataire-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;}
.party-mandataire-name{font-size:12px;font-weight:700;color:var(--blue-mid);}
.party-mandataire-addr{font-size:10px;color:var(--muted);margin-top:1px;}
.section{margin-bottom:1rem;}
.section-header{display:flex;align-items:baseline;gap:7px;border-left:3px solid var(--red);padding-left:10px;margin-bottom:.45rem;}
.section-num{font-size:12px;font-weight:700;color:var(--red);}
.section-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;}
/* Section créance (art.2) */
.section.s-creance .section-header{border-left-color:#1E40AF;}
.section.s-creance .section-num{color:#1E40AF;}
/* Section échéancier (art.3) */
.section.s-echeancier .section-header{border-left-color:#065F46;}
.section.s-echeancier .section-num{color:#065F46;}
.section.s-echeancier .ech-table thead tr{background:#065F46;}
.section.s-echeancier .ech-table tr.total-row td{background:#D1FAE5;border-top-color:#065F46;}
.section.s-echeancier .ech-table .n-cell{color:#065F46;}
.section-body{font-size:12px;line-height:1.7;padding-left:13px;}
.section-body p{margin-bottom:.3rem;}
.section-body ul{padding-left:1.2rem;}
.section-body ul li{margin-bottom:2px;}
.highlight{font-weight:700;color:var(--navy);}
.field-val{font-weight:700;color:var(--blue-mid);}
.ech-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:.4rem;}
.ech-table thead tr{background:var(--navy);color:#fff;}
.ech-table th{padding:7px 9px;text-align:left;font-weight:700;font-size:10px;letter-spacing:.04em;}
.ech-table td{padding:6px 9px;border-bottom:1px solid var(--border);}
.ech-table tr:nth-child(even) td{background:var(--gray-light);}
.section.s-echeancier .ech-table tr:nth-child(even) td{background:#F0FDF4;}
.ech-table tr.total-row td{background:var(--blue-light);font-weight:700;color:var(--navy);border-top:2px solid var(--blue);}
.ech-table .n-cell{color:var(--blue-mid);font-weight:700;}
.ech-table .amt-last{color:var(--red);font-weight:700;}
.ech-note{font-size:10px;color:var(--muted);font-style:italic;margin-top:5px;padding-left:13px;}

@media print{
  body{background:#fff;}
  .topbar,.red-bar,.sidebar,.summary-row{display:none!important;}
  .app{display:block;}
  .main{padding:0;max-height:none;}
  .preview-wrap{border:none;border-radius:0;max-width:100%;}
  .doc-body{padding:1.5rem 2rem;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" style="text-decoration:none;"><a href="index.html" style="text-decoration:none;"><div class="topbar-brand">YRAM RECOUVREMENT</div></a></a>
    <div class="topbar-divider"></div>
    <div class="topbar-sub">Générateur de protocole d'accord</div>
  </div>
  <nav class="nav">
    <a href="index.html">Accueil</a>

</div>
<div class="red-bar"></div>

<div class="app">
  <div class="sidebar">

    <!-- CRÉANCIER -->
    <div class="section-block block-creancier">
      <div class="section-block-header">
        <div class="section-block-icon">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="#6B7280" stroke-width="1.5"/><path d="M5 8h6M5 5.5h6M5 10.5h4" stroke="#6B7280" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        Créancier
      </div>
      <div class="section-block-body">
        <div class="field">
          <select id="sel-cr" onchange="pickCr()"><option value="">— Choisir —</option></select>
        </div>
        <input type="hidden" id="cr-nom">
        <input type="hidden" id="cr-addr">
      </div>
    </div>

    <!-- DÉBITEUR -->
    <div class="section-block block-debiteur">
      <div class="section-block-header">
        <div class="section-block-icon">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="#DC2626" stroke-width="1.5"/><path d="M3 13c0-2.761 2.239-4 5-4s5 1.239 5 4" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        Débiteur
      </div>
      <div class="section-block-body">
        <div class="field"><label>Nom complet</label><input id="db-nom" placeholder="ex: Balzan Alexandra" oninput="render()"></div>
        <div class="field"><label>Adresse</label><input id="db-addr" placeholder="ex: 1 Rue de la Plage, 97434 St-Gilles" oninput="render()"></div>
      </div>
    </div>

    <!-- CRÉANCE -->
    <div class="section-block block-creance">
      <div class="section-block-header">
        <div class="section-block-icon">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="#1E40AF" stroke-width="1.5"/><path d="M8 5v1.5M8 9.5V11M6.5 7.25C6.5 6.56 7.17 6 8 6s1.5.56 1.5 1.25c0 .83-.75 1.25-1.5 1.5v.75" stroke="#1E40AF" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        Créance
      </div>
      <div class="section-block-body">
        <div class="field"><label>Montant total dû (€)</label><input id="montant" type="number" step="0.01" min="0" placeholder="ex: 740.25" oninput="render()"></div>
        <div class="field">
          <label>Premier paiement (€) <span style="font-weight:400;color:var(--muted);font-size:10px">— optionnel</span></label>
          <input id="premier-paiement" type="number" step="0.01" min="0" placeholder="ex: 100.00" oninput="render()">
          <span id="hint-solde" style="font-size:11px;color:#185FA5;font-weight:600;display:none;"></span>
        </div>
        <div id="field-date-premier" style="display:none;height:0;overflow:hidden;margin-top:-4px;">
          <div class="field" style="padding-top:4px;">
          <label>Date du premier paiement <span style="font-weight:400;color:var(--muted);font-size:10px">— optionnel</span></label>
          <input id="date-premier" type="date" oninput="render()">
          </div>
        </div>
        <input type="hidden" id="objet">
        <div class="field"><label>Référence dossier</label><input id="ref" placeholder="ex: SP-1619-02/2023" value="SP-" oninput="render()"></div>
      </div>
    </div>

    <!-- ÉCHÉANCIER -->
    <div class="section-block block-echeancier">
      <div class="section-block-header">
        <div class="section-block-icon">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="#065F46" stroke-width="1.5"/><path d="M5 2v2M11 2v2M2 7h12" stroke="#065F46" stroke-width="1.2" stroke-linecap="round"/><path d="M5 10h1M8 10h1M11 10h1" stroke="#065F46" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        Échéancier
      </div>
      <div class="section-block-body">
        <div class="field"><label>Date 1ère échéance</label><input id="start-date" type="date" oninput="render()"></div>
        <div class="field"><label>Mode de paiement</label>
          <select id="mode" onchange="render()">
            <option>Carte bancaire</option>
            <option>Virement</option>
            <option>Chèque</option>
            <option>Espèces</option>
            <option>Prélèvement CB</option>
          </select>
        </div>
        <div style="display:flex;gap:6px;margin-top:2px;">
          <button class="toggle-btn active" id="btn-mode-mens" onclick="setEchMode('mens')">Par mensualité</button>
          <button class="toggle-btn" id="btn-mode-nb" onclick="setEchMode('nb')">Par nb d'échéances</button>
        </div>
        <div class="field" id="field-mens">
          <label>Mensualité (€)</label>
          <input id="mensualite" type="number" step="0.01" min="0" placeholder="ex: 125" oninput="render()">
          <span id="hint-mens" style="font-size:11px;color:#185FA5;font-weight:600;min-height:16px;"></span>
        </div>
        <div class="field" id="field-nb" style="display:none">
          <label>Nombre d'échéances</label>
          <input id="nb-echeances" type="number" step="1" min="1" max="240" placeholder="ex: 6" disabled oninput="render()">
          <span id="hint-nb" style="font-size:11px;color:#185FA5;font-weight:600;min-height:16px;"></span>
        </div>
      </div>
    </div>

    <button class="btn-print" onclick="window.print()">⬇︎ &nbsp;Imprimer / Exporter PDF</button>
  </div>

  <div class="main">
    <div class="summary-row" id="sum-row" style="display:none">
      <div class="sum-card"><div class="sum-label">Montant total</div><div class="sum-val red" id="s-mont">—</div></div>
      <div class="sum-card"><div class="sum-label">Nb d'échéances</div><div class="sum-val blue" id="s-nb">—</div></div>
      <div class="sum-card"><div class="sum-label">Dernière échéance</div><div class="sum-val" id="s-fin">—</div></div>
    </div>
    <div class="preview-wrap" id="preview">
      <div class="empty-state">
        <svg style="width:44px;height:44px;margin:0 auto 1rem;display:block;opacity:.2" viewBox="0 0 48 48" fill="none" stroke="#888" stroke-width="2">
          <rect x="8" y="4" width="32" height="40" rx="3"/><line x1="14" y1="14" x2="34" y2="14"/>
          <line x1="14" y1="20" x2="34" y2="20"/><line x1="14" y1="26" x2="28" y2="26"/>
        </svg>
        <div style="font-size:15px;font-weight:600;color:#555;margin-bottom:6px">Renseignez le formulaire</div>
        <div style="font-size:13px;color:#aaa">Le protocole d'accord s'affichera ici en temps réel.</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── LISTE DES CRÉANCIERS ───────────────────────────────────────────────────
const CREANCIERS = [
  {id:'prudence',   nom:'PRUDENCE CRÉOLE',         addr:'32 RUE ALEXIS DE VILLENEUVE 97400 SAINT-DENIS'},
  {id:'runeo',      nom:'RUNEO',                   addr:'53 RUE SAINTE-ANNE CS 61011 97743 SAINT-DENIS CEDEX 9'},
  {id:'dioneo',     nom:'DIONEO',                  addr:'53 RUE SAINTE-ANNE CS 61011 97743 SAINT-DENIS CEDEX 9'},
  {id:'possession', nom:'EAUX DE LA POSSESSION',   addr:'RUE WALDECK ROCHET BP92 97419 LA POSSESSION'},
  {id:'telco',      nom:'TELCO OI',                addr:'1 RUE JOSEPH WETZELL 97490 SAINTE-CLOTILDE'},
  {id:'edf',        nom:'EDF REUNION',             addr:'8 AV GEORGES BRASSENS 97400 SAINT-DENIS'},
  {id:'allianz',    nom:'ALLIANZ',                 addr:'130 RUE LEOPOLD RAMBAUD 97400 SAINT-DENIS'},
  {id:'coin-petits',nom:'LE COIN DES PETITS',      addr:"68 CHEMIN DE L'ADIEU BRAS DE PONTHO 97430 LE TAMPON"},
  {id:'soretole',   nom:'SORETOLE',                addr:'RUE BENOITE BOULARD 97410 SAINT-PIERRE'},
];
// ────────────────────────────────────────────────────────────────────────────

function rebuildSelect(){
  const sel = document.getElementById('sel-cr');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Choisir —</option>';
  CREANCIERS.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.nom;
    sel.appendChild(o);
  });
  if(cur && CREANCIERS.find(c => c.id === cur)) sel.value = cur;
}

function pickCr(){
  const c = CREANCIERS.find(x => x.id === document.getElementById('sel-cr').value);
  if(c){
    document.getElementById('cr-nom').value = c.nom;
    document.getElementById('cr-addr').value = c.addr;
  }
  render();
}

let echMode = 'mens';

function setEchMode(mode) {
  echMode = mode;
  const isMens = mode === 'mens';
  document.getElementById('btn-mode-mens').className = isMens ? 'toggle-btn active' : 'toggle-btn';
  document.getElementById('btn-mode-nb').className   = !isMens ? 'toggle-btn active' : 'toggle-btn';
  document.getElementById('field-mens').style.display = isMens ? '' : 'none';
  document.getElementById('field-nb').style.display   = isMens ? 'none' : '';
  document.getElementById('mensualite').disabled = !isMens;
  document.getElementById('nb-echeances').disabled = isMens;
  document.getElementById('hint-mens').textContent = '';
  document.getElementById('hint-nb').textContent = '';
  render();
}

function getMensualite(montant) {
  if(!montant || montant <= 0) return null;
  if(echMode === 'mens'){
    const raw = parseFloat(document.getElementById('mensualite').value);
    if(!raw || raw <= 0 || raw > montant) return null;
    const m = Math.ceil(raw);
    const nb = Math.ceil(montant / m);
    document.getElementById('hint-mens').textContent = `→ ${nb} échéance${nb>1?'s':''}`;
    return m;
  } else {
    const nb = parseInt(document.getElementById('nb-echeances').value);
    if(!nb || nb <= 0) return null;
    const m = Math.ceil(montant / nb);
    document.getElementById('hint-nb').textContent = `→ ${m.toLocaleString('fr-FR')} € / mois`;
    return m;
  }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return Number.isInteger(n) ? n.toLocaleString('fr-FR')+'\u00a0€' : n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+'\u00a0€'; }
function fmtD(d){ return d.toLocaleDateString('fr-FR'); }
function today(){ return new Date().toISOString().slice(0,10); }

function echeancier(total, mens, start, mode){
  const rows=[]; let rem=Math.round(total*100)/100, n=1;
  let d = new Date(start);
  while(rem>0.005 && n<=120){
    const m = rem <= mens ? rem : mens;
    rows.push({n, date:new Date(d), montant:m, mode});
    rem = Math.round((rem-m)*100)/100;
    d = new Date(d.getFullYear(), d.getMonth()+1, d.getDate());
    n++;
  }
  // Si la dernière échéance est < 50% d'une échéance normale, on la fusionne avec l'avant-dernière
  if(rows.length >= 2){
    const last = rows[rows.length-1];
    const seuil = mens * 0.5;
    if(last.montant < seuil){
      rows[rows.length-2].montant = Math.round((rows[rows.length-2].montant + last.montant)*100)/100;
      rows[rows.length-2].adjusted = true;
      rows.pop();
      rows.forEach((r,i) => r.n = i+1);
    }
  }
  if(rows.length>1) rows[rows.length-1].adjusted = rows[rows.length-1].montant !== mens;
  // Si la dernière échéance est > à la première, on place le montant fort en 1er
  if(rows.length >= 2 && rows[rows.length-1].montant > rows[0].montant){
    [rows[0].montant, rows[rows.length-1].montant] = [rows[rows.length-1].montant, rows[0].montant];
    rows[0].adjusted = true;
    rows[rows.length-1].adjusted = rows[rows.length-1].montant !== mens;
  }
  return rows;
}

  } else {

rebuildSelect();
document.getElementById('start-date').value = today();
document.getElementById('date-premier').value = today();
setEchMode('mens');
</script>
